{%extends 'base.html'%}
{%block content%}
<form method="get">
    <input type="text" name = "q" placeholder="Kitob nomi..." value="{{query|default:''}}">
    <button type="submit">Qidirish</button>
</form>
<hr>

  {% for book in books %}

        <h3>{{ book.title }}</h3>
        <p>{{ book.author }}</p>
        <p>{{ book.year }}</p>

        <hr>
    {% empty %}
        <p>Kitob topilmadi</p>


{%endfor%}
{%endblock%}
